services:
  intalant-postgres:
    image: postgres:18-bookworm
    container_name: intalant-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5



  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: intalant-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:intalant-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"


  migrate:
    image: kukymbr/goose-docker
    volumes:
      - ./migrations:/migrations
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=intalant-postgres port=${POSTGRES_PORT} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable"
    depends_on:
      intalant-postgres:
        condition: service_healthy
    


  app:
    build: .
    container_name: intalant-app
    volumes:
      - ./out:/out
    env_file: 
      - .env
    depends_on:
      intalant-postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: on-failure