services:
  intalant-postgres:
    image: postgres:18-bookworm
    container_name: intalant-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: always


  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: intalant-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:intalant-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"


  migrate:
    image: kukymbr/goose-docker
    volumes:
      - ./migrations:/migrations
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=${POSTGRES_HOST} port=${POSTGRES_PORT} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable"
    depends_on:
      - intalant-postgres